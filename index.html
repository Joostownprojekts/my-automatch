<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoMatch 🔥</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      // Nutzt automatisch die eigene Vercel-Domain für Backend-Anfragen
      window.VITE_BACKEND_URL = window.location.origin;
    </script>

    <script type="text/babel" src="App.jsx"></script>
    <script type="text/babel">
      // Startet die App, sobald Babel bereit ist
      setTimeout(function() {
        if (typeof AutoMatch !== 'undefined') {
          var root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(AutoMatch));
        } else {
          console.error("AutoMatch-Komponente wird noch geladen...");
        }
      }, 300);
    </script>
  </body>
</html>
